<body>
   <div id="myclock"></div>

   <script>
       // 值小于10时，在前面补0
       function dateFilter(date){
            if(date < 10){return "0"+date;}
            return date;
       }

       function fun_clock() {
           var today = new Date();

           var year = today.getFullYear();
           var month = today.getMonth()+1;
           var date = today.getDate();
           var hour = today.getHours();
           var minute = today.getMinutes();
           var second = today.getSeconds();

           var apm="AM";
           if (hour>12) {
              hour=hour-12;
              apm="PM";
           }

           var weekday = 0;
           switch(today.getDay()){
              case 0:
                weekday = "星期日";
              break;
              case 1:
                weekday = "星期一";
              break;
              case 2:
                weekday = "星期二";
              break;
              case 3:
                weekday = "星期三";
              break;
              case 4:
                weekday = "星期四";
              break;
              case 5:
                weekday = "星期五";
              break;
              case 6:
                weekday = "星期六";
              break;
           }

           document.getElementById("myclock").innerHTML= "系统时间"+year+"年"+month+"月"+date+"日 "+dateFilter(hour)+":"+dateFilter(minute)+":"+dateFilter(second)+" "+apm+" "+weekday;
       }

       var myTime = setInterval(fun_clock, 1000);
   </script>
